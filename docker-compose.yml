services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: laptrack
      POSTGRES_PASSWORD: laptrack_dev
      POSTGRES_DB: laptrack
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laptrack"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./server
    environment:
      DATABASE_URL: postgresql://laptrack:laptrack_dev@postgres:5432/laptrack
      JWT_SECRET: laptrack-prod-secret-k8s7d2m4
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./client
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-certs:/etc/nginx/ssl
      - certbot-webroot:/var/www/certbot
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  certbot-certs:
  certbot-webroot:
