version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: laptrack
      POSTGRES_PASSWORD: laptrack_dev
      POSTGRES_DB: laptrack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laptrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://laptrack:laptrack_dev@postgres:5432/laptrack
      JWT_SECRET: laptrack-prod-secret-k8s7d2m4
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
